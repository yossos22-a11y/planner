<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>원형 실시간 계획표</title>

<style>
:root{ --size: min(90vw, 380px); }
*{ box-sizing:border-box; }

body{
  margin:0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  font-family: system-ui, -apple-system, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
  background:#fff;
  padding-top: env(safe-area-inset-top);
}

.wrap{ width:100%; max-width:560px; padding:16px; }

.card{
  border:1px solid #eee;
  border-radius:18px;
  padding:14px;
  box-shadow:0 6px 20px rgba(0,0,0,.06);
}

.topBig{
  text-align:center;
  margin-bottom:12px;
  font-weight:900;
  font-size:clamp(18px,5vw,28px);
  font-variant-numeric: tabular-nums;
}

.dial{ width:var(--size); height:var(--size); margin:0 auto; }
svg{ width:100%; height:100%; display:block; }

.timerBox{
  margin-top:14px;
  border:1px solid #eee;
  border-radius:16px;
  padding:12px;
  display:grid;
  gap:10px;
}
.timerTop{
  display:flex;
  justify-content:space-between;
}
.timerDisplay{
  font-weight:900;
  font-size:28px;
}
.progress{
  height:10px;
  border-radius:999px;
  background:#f1f1f1;
}
.progress>div{height:100%;width:0%;background:#000;}

</style>
</head>

<body>
<div class="wrap">
<div class="card">

<div class="topBig" id="topDateTime">----</div>

<div class="dial">
<svg viewBox="-6 -6 112 112">

<g id="hours"></g>
<circle cx="50" cy="50" r="40" fill="none" stroke="#eee" stroke-width="12"/>
<g id="arcs"></g>
<g id="labels"></g>

<line id="hand" x1="50" y1="50" x2="50" y2="12" stroke="#000" stroke-width="0.9"/>
<polygon id="arrow" points="0,-2 -1.6,1.6 1.6,1.6" fill="#000"/>

<g>
  <circle cx="50" cy="50" r="18" fill="#fff"/>
  <text id="centerLabel" x="50" y="41.5" text-anchor="middle" font-size="5.6">-</text>
  <text id="centerRange" x="50" y="48.8" text-anchor="middle" font-size="5.0">--</text>
  <text id="centerRemain" x="50" y="56.2" text-anchor="middle" font-size="3.9"></text>
  <text id="centerToSleep" x="50" y="61.9" text-anchor="middle" font-size="3.6"></text>
</g>

</svg>
</div>

<div class="timerBox">
  <div class="timerTop">
    <div>타이머</div>
    <div id="timerDisplay">00:25:00</div>
  </div>
  <div class="progress"><div id="timerBar"></div></div>
</div>

</div>
</div>

<script>
const SEGMENTS=[
{start:"06:00",end:"09:30",label:"육아/가사",color:"#FFD400"},
{start:"09:30",end:"12:00",label:"공부",color:"#5BC0FF"},
{start:"12:00",end:"13:00",label:"점심",color:"#9E9E9E"},
{start:"13:00",end:"16:00",label:"공부",color:"#5BC0FF"},
{start:"16:00",end:"21:30",label:"육아/가사",color:"#FFD400"},
{start:"21:30",end:"23:00",label:"운동",color:"#FF5B5B"},
{start:"23:00",end:"24:00",label:"취침준비",color:"#0B2A6F"},
{start:"00:00",end:"06:00",label:"수면",color:"#7A3FF2"}
];

const SLEEP_START="00:00";
const R=40;

const toMin=t=>{const[a,b]=t.split(":").map(Number);return a*60+b;}
const pad=n=>String(n).padStart(2,"0");
const frac=f=>f*2*Math.PI-Math.PI/2;

function build(){
SEGMENTS.forEach(s=>{
let a=toMin(s.start)/1440,b=toMin(s.end)/1440;
arcs.innerHTML+=`<path d="M50 10 A40 40 0 0 1 90 50" stroke="${s.color}" stroke-width="14" fill="none"/>`;
let mid=(toMin(s.start)+((toMin(s.end)-toMin(s.start)+1440)%1440)/2)%1440/1440;
let ang=frac(mid);
labels.innerHTML+=`<text x="${50+40*Math.cos(ang)}" y="${50+40*Math.sin(ang)}" fill="#fff" font-size="4">${s.label}</text>`;
});
}

function update(){
const n=new Date();
topDateTime.textContent=`${pad(n.getHours())}:${pad(n.getMinutes())}:${pad(n.getSeconds())}`;

let now=n.getHours()*60+n.getMinutes();

let seg=SEGMENTS.find(s=>{
let a=toMin(s.start),b=toMin(s.end);
return b>a?now>=a&&now<b:now>=a||now<b;
});

if(seg){
centerLabel.textContent=seg.label;
centerRange.textContent=`${seg.start}~${seg.end}`;
}

requestAnimationFrame(update);
}

build();
update();
</script>
</body>
</html>
