<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>원형 계획표</title>
<style>
body {
  padding-top: 40px;
  margin: 0;
  background: radial-gradient(circle at top, #1c2333, #0f1117);
  color: #e6edf3;
  font-family: 'Pretendard','Noto Sans KR',sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
}

#clock {
  margin: 16px 0 6px;
  font-size: 28px;
  font-weight: 700;
  color: #ffffff;
}

canvas {
  margin-top: 10px;
  width: 92vw;
  height: 92vw;
  max-width: 420px;
  max-height: 420px;
  background: linear-gradient(145deg,#121722,#0d111a);
  border-radius: 50%;
  box-shadow: 0 12px 40px rgba(0,0,0,0.7), inset 0 0 20px rgba(255,255,255,0.05);
}

#countdown {
  margin-top: 16px;
  text-align: center;
}

.controls {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 8px;
  flex-wrap: nowrap;
}

.inputs {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 6px;
}

.buttons {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 6px;
}

input {
  width: 45px;
  padding: 4px;
  margin: 3px;
  background: #ffffff;
  color: #333;
  border: 1px solid #d0d5ff;
  border-radius: 6px;
  font-size: 12px;
}

button {
  padding: 6px 10px;
  margin: 4px;
  background: #7c8cff;
  color: white;
  border: none;
  border-radius: 6px;
  font-size: 13px;
}

button:hover { background:#5f6fff; }

.timeInfo {
  display:flex;
  justify-content:center;
  gap:16px;
  font-size:18px;
  font-weight:600;
  margin-bottom:8px;
}

#progressBar {
  width: 100vw;
  max-width: 520px;
  height: 16px;
  background: rgba(255,255,255,0.08);
  margin: 10px auto 12px;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: inset 0 0 8px rgba(0,0,0,0.6);
}

#progress {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg,#7aa2ff,#4f6cff);
  box-shadow: 0 0 10px rgba(122,162,255,0.8);
  transition: width 0.3s ease;
}
</style>
</head>
<body>

<div id="clock"></div>
<canvas id="planner" width="400" height="400"></canvas>

<div id="countdown">

  <div class="timeInfo">
    <div id="timer"></div>
    <div id="endTime"></div>
  </div>

  <div id="progressBar"><div id="progress"></div></div>

  <div class="controls">
  <div class="inputs">
    <input type="number" id="hours" placeholder="시">
    <input type="number" id="minutes" placeholder="분">
  </div>
  <div class="buttons">
    <button onclick="startCountdown()">시작</button>
    <button onclick="stopCountdown()">정지</button>
    <button onclick="resetCountdown()">리셋</button>
  </div>
</div>

</div>

<script>
function updateClock() {
  const now = new Date();
  const days = ['일','월','화','수','목','금','토'];

  const text = now.getFullYear() + '-' +
    String(now.getMonth()+1).padStart(2,'0') + '-' +
    String(now.getDate()).padStart(2,'0') + ' (' +
    days[now.getDay()] + ') ' +
    String(now.getHours()).padStart(2,'0') + ':' +
    String(now.getMinutes()).padStart(2,'0') + ':' +
    String(now.getSeconds()).padStart(2,'0');

  document.getElementById('clock').innerText = text;
  draw(now);
}
setInterval(updateClock, 1000);

const canvas = document.getElementById('planner');
const ctx = canvas.getContext('2d');

let cx, cy, r;

function resizeCanvas(){
  const size = canvas.clientWidth;
  canvas.width = size;
  canvas.height = size;
  cx = size/2;
  cy = size/2;
  r = size/2 - 40;
}

window.addEventListener('resize', resizeCanvas);
resizeCanvas();

const schedule = [
  [6, 9.5, '육아/가사'],
  [9.5, 12, '공부'],
  [12, 13, '점심'],
  [13, 16, '공부'],
  [16, 21.5, '육아/가사'],
  [21.5, 23, '운동'],
  [23, 24, '목욕'],
  [0, 6, '수면']
];

function draw(now=new Date()) {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  const colorMap = {
    '육아/가사': '#fde68a',
    '공부': '#fca5a5',
    '점심': '#fdba74',
    '운동': '#93c5fd',
    '목욕': '#a5b4fc',
    '수면': '#c4b5fd'
  };

  schedule.forEach((s) => {
    const start = (s[0]/24)*2*Math.PI - Math.PI/2;
    const end = (s[1]/24)*2*Math.PI - Math.PI/2;

    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, start, end);
    ctx.closePath();

    ctx.fillStyle = colorMap[s[2]] || '#cbd5f5';
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(start)*r, cy + Math.sin(start)*r);
    ctx.strokeStyle = '#6b7280';
    ctx.lineWidth = 1;
    ctx.stroke();

    const mid = (start+end)/2;
    const tx = cx + Math.cos(mid)*95;
    const ty = cy + Math.sin(mid)*95;

    ctx.fillStyle = '#ffffff';
    ctx.font = '600 15px Pretendard';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(0,0,0,0.6)';
    ctx.shadowBlur = 6;
    ctx.fillText(s[2], tx, ty);
    ctx.shadowBlur = 0;
  });

  for(let i=1;i<=24;i++){
    const angle = (i/24)*2*Math.PI - Math.PI/2;
    const outerR = r + 20;
    const tx = cx + Math.cos(angle)*outerR;
    const ty = cy + Math.sin(angle)*outerR;
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 18px Pretendard';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(255,255,255,0.9)';
    ctx.shadowBlur = 6;
    ctx.fillText(i, tx, ty);
    ctx.shadowBlur = 0;
  }

  const hour = now.getHours() + now.getMinutes()/60;
  const minute = now.getMinutes() + now.getSeconds()/60;
  const second = now.getSeconds();

  drawHand(hour/24, r*0.55, 5, '#000000');
  drawHand(minute/60, r*0.8, 4, '#3b82f6');
  drawHand(second/60, r*0.95, 3, '#ff2d2d');

  ctx.beginPath();
  ctx.arc(cx, cy, 5, 0, 2*Math.PI);
  ctx.fillStyle = '#444';
  ctx.fill();
}

function drawHand(value, length, width, color){
  const angle = value*2*Math.PI - Math.PI/2;
  const x = cx + Math.cos(angle)*length;
  const y = cy + Math.sin(angle)*length;

  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(x, y);
  ctx.strokeStyle = color;
  ctx.lineWidth = width;
  ctx.lineCap = 'round';
  ctx.shadowColor = color;
  ctx.shadowBlur = 14;
  ctx.stroke();
  ctx.shadowBlur = 0;
}

let countdownTime = 0;
let totalTime = 0;
let countdown;

function updatePreview(){
  const h = parseInt(document.getElementById('hours').value) || 0;
  const m = parseInt(document.getElementById('minutes').value) || 0;

  const total = h*3600 + m*60;
  const end = new Date(Date.now() + total*1000);

  // 종료시각 항상 표시
  const endText = total > 0
    ? String(end.getHours()).padStart(2,'0') + ':' + String(end.getMinutes()).padStart(2,'0')
    : '--:--';

  document.getElementById('endTime').innerText = '종료 시각 ' + endText;

  // 남은시간 항상 표시
  let hh = Math.floor(total/3600);
  let mm = Math.floor((total%3600)/60);
  let ss = total%60;

  document.getElementById('timer').innerText = '남은 시간 ' +
    String(hh).padStart(2,'0') + ':' +
    String(mm).padStart(2,'0') + ':' +
    String(ss).padStart(2,'0');
}

function startCountdown(){
  const h = parseInt(document.getElementById('hours').value) || 0;
  const m = parseInt(document.getElementById('minutes').value) || 0;

  countdownTime = h*3600 + m*60;
  totalTime = countdownTime;

  clearInterval(countdown);
  countdown = setInterval(runCountdown, 1000);
}

function runCountdown(){
  if(countdownTime <= 0){
    clearInterval(countdown);
    document.getElementById('timer').innerText = '남은 시간 끝';
    document.getElementById('progress').style.width = '100%';
    return;
  }

  let h = Math.floor(countdownTime/3600);
  let m = Math.floor((countdownTime%3600)/60);
  let s = countdownTime%60;

  document.getElementById('timer').innerText = '남은 시간 ' +
    String(h).padStart(2,'0') + ':' +
    String(m).padStart(2,'0') + ':' +
    String(s).padStart(2,'0');

  const percent = ((totalTime - countdownTime)/totalTime)*100;
  document.getElementById('progress').style.width = percent + '%';

  countdownTime--;
}

function stopCountdown(){ clearInterval(countdown); }

function resetCountdown(){
  clearInterval(countdown);
  countdown = null;
  countdownTime = 0;
  totalTime = 0;

  // 항상 보이게 유지 (사라지지 않도록)
  document.getElementById('timer').innerText = '남은 시간 00:00:00';
  document.getElementById('endTime').innerText = '종료 시각 --:--';
  document.getElementById('progress').style.width = '0%';
}

document.getElementById('hours').addEventListener('input', updatePreview);
document.getElementById('minutes').addEventListener('input', updatePreview);

updateClock();
</script>

</body>
</html>
