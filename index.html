<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>원형 계획표</title>
<style>
body {
  padding-top: 40px;
  margin: 0;
  background: radial-gradient(circle at top, #1e2530, #0f1319);
  color: #f1f5f9;
  font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
}

#clock {
  margin: 16px 0 8px;
  font-size: 32px;
  font-weight: 800;
  color: #ffffff;
  letter-spacing: -0.5px;
  text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
}

canvas {
  margin-top: 10px;
  width: 92vw;
  height: 92vw;
  max-width: 440px;
  max-height: 440px;
  background: linear-gradient(145deg, #141b27, #0b1017);
  border-radius: 50%;
  box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 0 30px rgba(255,255,255,0.03);
}

#countdown {
  margin-top: 24px;
  text-align: center;
  width: 100%;
  max-width: 440px;
  padding: 0 16px;
  box-sizing: border-box;
}

.controls {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 12px;
  background: rgba(255, 255, 255, 0.03);
  padding: 16px;
  border-radius: 16px;
  border: 1px solid rgba(255, 255, 255, 0.05);
}

.inputs {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 8px;
}

.inputs span {
  font-size: 14px;
  color: #94a3b8;
}

.buttons {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 8px;
}

input {
  width: 60px;
  padding: 8px;
  background: #1e293b;
  color: #ffffff;
  border: 1px solid #334155;
  border-radius: 8px;
  font-size: 14px;
  text-align: center;
  font-weight: 600;
}

input:focus {
  outline: none;
  border-color: #6366f1;
}

button {
  padding: 8px 16px;
  background: #4f46e5;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
}

button:hover { 
  background: #4338ca; 
  transform: translateY(-1px);
}

button:nth-child(2) {
  background: #475569;
}
button:nth-child(2):hover {
  background: #334155;
}

button:nth-child(3) {
  background: #ef4444;
}
button:nth-child(3):hover {
  background: #dc2626;
}

.timeInfo {
  display: flex;
  justify-content: space-between;
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 8px;
  color: #cbd5e1;
  padding: 0 4px;
}

#progressBar {
  width: 100%;
  height: 12px;
  background: rgba(255,255,255,0.06);
  margin: 8px auto 20px;
  border-radius: 6px;
  overflow: hidden;
}

#progress {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #6366f1, #a855f7);
  box-shadow: 0 0 12px rgba(99, 102, 241, 0.6);
  transition: width 0.3s ease;
}
</style>
</head>
<body>

<div id="clock"></div>
<canvas id="planner" width="440" height="440"></canvas>

<div id="countdown">
  <div class="timeInfo">
    <div id="timer">남은 시간 00:00:00</div>
    <div id="endTime">종료 시각 --:--</div>
  </div>

  <div id="progressBar"><div id="progress"></div></div>

  <div class="controls">
    <div class="inputs">
      <input type="number" id="hours" min="0" max="23" placeholder="0"> <span>시간</span>
      <input type="number" id="minutes" min="0" max="59" placeholder="0"> <span>분</span>
    </div>
    <div class="buttons">
      <button onclick="startCountdown()">시작</button>
      <button onclick="stopCountdown()">정지</button>
      <button onclick="resetCountdown()">리셋</button>
    </div>
  </div>
</div>

<script>
function updateClock() {
  const now = new Date();
  const days = ['일','월','화','수','목','금','토'];

  const text = now.getFullYear() + '-' +
    String(now.getMonth()+1).padStart(2,'0') + '-' +
    String(now.getDate()).padStart(2,'0') + ' (' +
    days[now.getDay()] + ') ' +
    String(now.getHours()).padStart(2,'0') + ':' +
    String(now.getMinutes()).padStart(2,'0') + ':' +
    String(now.getSeconds()).padStart(2,'0');

  document.getElementById('clock').innerText = text;
  draw(now);
}
setInterval(updateClock, 1000);

const canvas = document.getElementById('planner');
const ctx = canvas.getContext('2d');

let cx, cy, r;

function resizeCanvas(){
  const size = canvas.clientWidth;
  canvas.width = size * window.devicePixelRatio;
  canvas.height = size * window.devicePixelRatio;
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
  cx = size/2;
  cy = size/2;
  r = size/2 - 35;
}

window.addEventListener('resize', resizeCanvas);
resizeCanvas();

const schedule = [
  [6, 9.5, '육아/가사'],
  [9.5, 17.5, '공부/가사'],
  [17.5, 21.5, '육아/가사'],
  [21.5, 22.5, '운동'],
  [22.5, 24, '취침준비'],
  [0, 6, '수면']
];

function draw(now=new Date()) {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  const colorMap = {
    '육아/가사': '#ffeaa7', 
    '공부/가사': '#ffb8b8', 
    '운동': '#81ecec',     
    '취침준비': '#ffcb74', 
    '수면': '#a29bfe'     
  };

  schedule.forEach((s) => {
    const start = (s[0]/24)*2*Math.PI - Math.PI/2;
    const end = (s[1]/24)*2*Math.PI - Math.PI/2;

    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, start, end);
    ctx.closePath();

    ctx.fillStyle = colorMap[s[2]] || '#cbd5e1';
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(start)*r, cy + Math.sin(start)*r);
    ctx.strokeStyle = 'rgba(15, 19, 25, 0.25)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  });

  schedule.forEach((s, idx) => {
    const start = (s[0]/24)*2*Math.PI - Math.PI/2;
    const end = (s[1]/24)*2*Math.PI - Math.PI/2;
    const duration = s[1] - s[0];
    const mid = (start+end)/2;

    ctx.fillStyle = '#1e293b'; 
    ctx.font = '700 14px Pretendard';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(255, 255, 255, 0.5)';
    ctx.shadowBlur = 4;

    if (s[2] === '취침준비') {
      const lines = ['취침', '준비'];
      lines.forEach((line, lineIdx) => {
        const tyOffset = (lineIdx - 0.5) * 16;
        const tx = cx + Math.cos(mid) * (r * 0.70);
        const ty = cy + Math.sin(mid) * (r * 0.70) + tyOffset;
        ctx.fillText(line, tx, ty);
      });
    } else if (s[2] === '운동') {
      const tx = cx + Math.cos(mid) * (r * 0.72);
      const ty = cy + Math.sin(mid) * (r * 0.72);
      ctx.fillText(s[2], tx, ty);
    } else {
      const tx = cx + Math.cos(mid) * (r * 0.58);
      const ty = cy + Math.sin(mid) * (r * 0.58);
      ctx.fillText(s[2], tx, ty);
    }
    
    ctx.shadowBlur = 0;
  });

  for(let i=1;i<=24;i++){
    const angle = (i/24)*2*Math.PI - Math.PI/2;
    const outerR = r + 18;
    const tx = cx + Math.cos(angle)*outerR;
    const ty = cy + Math.sin(angle)*outerR;
    ctx.fillStyle = '#94a3b8';
    ctx.font = '600 13px Pretendard';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(i, tx, ty);
  }

  const hour = now.getHours() + now.getMinutes()/60;
  const minute = now.getMinutes() + now.getSeconds()/60;
  const second = now.getSeconds();

  drawHand(hour/24, r*0.5, 5, '#1e293b'); 
  drawHand(minute/60, r*0.75, 3, '#4f46e5'); 
  drawHand(second/60, r*0.88, 1.5, '#ef4444'); 

  ctx.beginPath();
  ctx.arc(cx, cy, 6, 0, 2*Math.PI);
  ctx.fillStyle = '#1e293b';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(cx, cy, 2, 0, 2*Math.PI);
  ctx.fillStyle = '#ffffff';
  ctx.fill();
}

function drawHand(value, length, width, color){
  const angle = value*2*Math.PI - Math.PI/2;
  const x = cx + Math.cos(angle)*length;
  const y = cy + Math.sin(angle)*length;

  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(x, y);
  ctx.strokeStyle = color;
  ctx.lineWidth = width;
  ctx.lineCap = 'round';
  ctx.stroke();
}

let countdownTime = 0;
let totalTime = 0;
let countdown;
// 타이머 종료 시 실행되는 짧고 청아한 학교 종소리 함수
function playAlarmSound() {
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  
  // 맑은 벨소리를 만드는 내부 헬퍼 함수
  function playBellTone(freq, startTime, duration) {
    const osc = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    
    // 학교 종소리 특유의 맑고 은은한 느낌을 위해 사인파(sine) 사용
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, startTime);
    
    // 타격음 직후 자연스럽고 부드럽게 잔향이 사라지도록 페이드아웃 설정
    gainNode.gain.setValueAtTime(0.25, startTime);
    gainNode.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);
    
    osc.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    
    osc.start(startTime);
    osc.stop(startTime + duration);
  }
  
  const now = audioCtx.currentTime;
  
  // 정겨운 "솔도레미" 4음절 학교 종소리 (빠르고 경쾌한 템포)
  playBellTone(783.99, now, 0.25);       // 솔 (G5)
  playBellTone(523.25, now + 0.22, 0.25); // 도 (C5)
  playBellTone(587.33, now + 0.44, 0.25); // 레 (D5)
  playBellTone(659.25, now + 0.66, 0.4);  // 미 (E5)
}
function updatePreview(){
  const h = parseInt(document.getElementById('hours').value) || 0;
  const m = parseInt(document.getElementById('minutes').value) || 0;

  const total = h*3600 + m*60;
  const end = new Date(Date.now() + total*1000);

  const endText = total > 0
    ? String(end.getHours()).padStart(2,'0') + ':' + String(end.getMinutes()).padStart(2,'0')
    : '--:--';

  document.getElementById('endTime').innerText = '종료 시각 ' + endText;

  let hh = Math.floor(total/3600);
  let mm = Math.floor((total%3600)/60);
  let ss = total%60;

  document.getElementById('timer').innerText = '남은 시간 ' +
    String(hh).padStart(2,'0') + ':' +
    String(mm).padStart(2,'0') + ':' +
    String(ss).padStart(2,'0');
}

function startCountdown(){
  const h = parseInt(document.getElementById('hours').value) || 0;
  const m = parseInt(document.getElementById('minutes').value) || 0;

  countdownTime = h*3600 + m*60;
  if(countdownTime <= 0) return;
  totalTime = countdownTime;

  clearInterval(countdown);
  countdown = setInterval(runCountdown, 1000);
}

function runCountdown(){
  if(countdownTime <= 0){
    clearInterval(countdown);
    document.getElementById('timer').innerText = '남은 시간 끝';
    document.getElementById('progress').style.width = '100%';
    playAlarmSound();
    return;
  }

  let h = Math.floor(countdownTime/3600);
  let m = Math.floor((countdownTime%3600)/60);
  let s = countdownTime%60;

  document.getElementById('timer').innerText = '남은 시간 ' +
    String(h).padStart(2,'0') + ':' +
    String(m).padStart(2,'0') + ':' +
    String(s).padStart(2,'0');

  const percent = ((totalTime - countdownTime)/totalTime)*100;
  document.getElementById('progress').style.width = percent + '%';

  countdownTime--;
}

function stopCountdown(){ clearInterval(countdown); }

function resetCountdown(){
  clearInterval(countdown);
  countdown = null;
  countdownTime = 0;
  totalTime = 0;

  document.getElementById('timer').innerText = '남은 시간 00:00:00';
  document.getElementById('endTime').innerText = '종료 시각 --:--';
  document.getElementById('progress').style.width = '0%';
  document.getElementById('hours').value = '';
  document.getElementById('minutes').value = '';
}

document.getElementById('hours').addEventListener('input', updatePreview);
document.getElementById('minutes').addEventListener('input', updatePreview);

updateClock();
</script>

</body>
</html>
